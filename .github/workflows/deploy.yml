name: Deploy on tag

# 仅在打 tag（如 v1.0.0、v1.1）时触发
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:    # 也支持在 Actions 页手动触发

permissions:
  contents: read
  pages: write
  id-token: write       # GitHub Pages OIDC

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  NEXT_PUBLIC_VIDEO_BASE_URL: ${{ secrets.NEXT_PUBLIC_VIDEO_BASE_URL }}
  NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      # 不指定 version，pnpm/action-setup 会读 package.json 里的 packageManager 字段
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build static export
        working-directory: apps/web
        run: pnpm build

      - name: Upload built artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: apps/web/out
          if-no-files-found: error
          retention-days: 7

  # CF Pages 部署暂未启用（需要 CLOUDFLARE_API_TOKEN secret）
  # 启用时把下面 if 条件改回去
  deploy-cf-pages:
    if: false
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://xiquhub.com
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: out
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy out \
            --project-name=xiqu-archive \
            --branch=main \
            --commit-dirty=true

  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: out

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
